name: Release

on:
  push:
    tags:
      - 'v*'
      - 'mobile-v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    if: "!startsWith(github.ref_name, 'mobile-')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Release version: $version"

      - name: Restore dependencies
        run: dotnet restore AgentPaw/AgentPaw.csproj

      - name: Publish (self-contained win-x64 single-file)
        run: >
          dotnet publish AgentPaw/AgentPaw.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ steps.version.outputs.version }}
          -p:AssemblyVersion=${{ steps.version.outputs.version }}.0
          -p:FileVersion=${{ steps.version.outputs.version }}.0

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Update installer version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $iss = Get-Content installer/AgentPaw.iss -Raw
          $iss = $iss -replace 'AppVersion=\d+\.\d+\.\d+', "AppVersion=$version"
          $iss = $iss -replace 'AppVerName=AgentPaw \d+\.\d+\.\d+', "AppVerName=AgentPaw $version"
          $iss = $iss -replace 'OutputBaseFilename=AgentPaw_Setup_v\d+\.\d+\.\d+', "OutputBaseFilename=AgentPaw_Setup_v$version"
          Set-Content installer/AgentPaw.iss -Value $iss

      - name: Compile Inno Setup installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer/AgentPaw.iss

      - name: Generate SHA256 sidecar
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $installer = "installer/installer_output/AgentPaw_Setup_v$version.exe"
          $hash = (Get-FileHash -Path $installer -Algorithm SHA256).Hash.ToLower()
          $sidecar = "$installer.sha256"
          "$hash  AgentPaw_Setup_v$version.exe" | Out-File -FilePath $sidecar -Encoding ascii -NoNewline
          Write-Host "SHA256: $hash"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: AgentPaw v${{ steps.version.outputs.version }}
          body: |
            AgentPaw v${{ steps.version.outputs.version }} 릴리스.

            ## 설치 방법
            `AgentPaw_Setup_v${{ steps.version.outputs.version }}.exe` 를 다운로드 후 실행한다.

            ## 무결성 검증
            `.sha256` 파일로 다운로드 파일의 SHA256 해시를 검증할 수 있다.
            앱 내 자동 업데이트 기능이 검증을 자동 수행한다.
          files: |
            installer/installer_output/AgentPaw_Setup_v${{ steps.version.outputs.version }}.exe
            installer/installer_output/AgentPaw_Setup_v${{ steps.version.outputs.version }}.exe.sha256
          draft: false
          prerelease: false

  build-android:
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#mobile-}"   # mobile-v0.5.14 → v0.5.14
          VERSION="${VERSION#v}"     # v0.5.14 → 0.5.14
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate app icons
        run: |
          python3 - <<'PYEOF'
          import struct, zlib, os

          def make_png(w, h):
              def chunk(tag, data):
                  crc = struct.pack('>I', zlib.crc32(tag + data) & 0xffffffff)
                  return struct.pack('>I', len(data)) + tag + data + crc
              sig  = b'\x89PNG\r\n\x1a\n'
              ihdr = chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0))
              row  = b'\x00' + bytes([0x67, 0x50, 0xA4] * w)
              idat = chunk(b'IDAT', zlib.compress(row * h))
              iend = chunk(b'IEND', b'')
              return sig + ihdr + idat + iend

          sizes = {'mipmap-mdpi':48,'mipmap-hdpi':72,'mipmap-xhdpi':96,
                   'mipmap-xxhdpi':144,'mipmap-xxxhdpi':192}
          base = 'FlutterApp/android/app/src/main/res'
          for d, s in sizes.items():
              p = os.path.join(base, d)
              os.makedirs(p, exist_ok=True)
              with open(os.path.join(p, 'ic_launcher.png'), 'wb') as f:
                  f.write(make_png(s, s))
          print('Icons generated.')
          PYEOF

      - name: Flutter pub get
        working-directory: FlutterApp
        run: flutter pub get

      - name: Build APK (release)
        working-directory: FlutterApp
        run: flutter build apk --release --build-name=${{ steps.version.outputs.version }} --build-number=${GITHUB_RUN_NUMBER}

      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mv FlutterApp/build/app/outputs/flutter-apk/app-release.apk \
             FlutterApp/build/app/outputs/flutter-apk/AgentPaw_v${VERSION}.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: FlutterApp/build/app/outputs/flutter-apk/AgentPaw_v${{ steps.version.outputs.version }}.apk
